name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Ruff check
        run: ruff check src/ launcher/ tests/ scripts/ app/setup_hub.py

      - name: Black check
        run: black --check src/ launcher/ tests/ scripts/ app/setup_hub.py

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-min.txt
          pip install -r requirements-cli.txt
          pip install -r requirements-install.txt
          pip install -e ".[dashboard-nicegui,dev]"
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=term --cov-fail-under=80

      - name: Dashboard tests with coverage
        run: |
          pytest tests/test_nicegui_dashboard.py tests/test_nicegui_dashboard_ui.py \
            tests/test_test_lab_service.py tests/test_transcription_websocket.py \
            tests/test_dashboard.py -v \
            --cov=app/nicegui_dashboard/services --cov=app/nicegui_dashboard/settings \
            --cov=app/nicegui_dashboard/state --cov-report=term-missing --cov-fail-under=55

  api-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-min.txt
          pip install -r requirements-api.txt
          pip install pytest pytest-cov httpx

      - name: API smoke (fast)
        run: pytest tests/test_api_smoke.py -q

      - name: API layer tests (≥90% coverage on src/api)
        run: |
          pytest tests/test_api.py tests/test_api_coverage.py -q \
            --cov=src/api --cov-report=term-missing --cov-fail-under=90

  docker:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sentiment-api .