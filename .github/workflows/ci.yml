name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Ruff check
        run: ruff check src/ launcher/ tests/ scripts/ app/

      - name: Black check
        run: black --check src/ launcher/ tests/ scripts/ app/

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[min,cli,asr,install,dev,dashboard-nicegui]"

      - name: Run tests
        env:
          ANALYZER_VALIDATION_MODE: strict
        run: pytest tests/ -v --cov=src --cov-report=term --cov-fail-under=80

      - name: Dashboard tests with coverage (archived NiceGUI)
        run: |
          pytest tests/test_nicegui_dashboard.py tests/test_nicegui_dashboard_ui.py \
            tests/test_test_lab_service.py tests/test_transcription_websocket.py \
            tests/test_dashboard.py -v \
            --cov=app/archive/nicegui_dashboard/services --cov=app/archive/nicegui_dashboard/settings \
            --cov=app/archive/nicegui_dashboard/state --cov-report=term-missing --cov-fail-under=55

  api-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install API test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[min,asr,api,install,dev]"

      - name: API smoke (fast)
        run: pytest tests/test_api_smoke.py -q

      - name: API layer tests (≥90% coverage on src/api)
        run: |
          pytest tests/test_api.py tests/test_api_coverage.py -q \
            --cov=src/api --cov-report=term-missing --cov-fail-under=90

  docker:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sentiment-api .

  webui:
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e

  finetune-smoke:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install training deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[training,min,dev]"

      - name: Fine-tune config and corpus tests
        run: pytest tests/test_finetune.py -q

      - name: Validate domain corpus
        run: python scripts/validate_domain_corpus.py data/callcenter_val.csv --min-rows 500

      - name: Sentiment eval gate (heuristic smoke)
        run: python scripts/eval_sentiment_gate.py --backend heuristic --output reports/domain_eval_ci.json

  analyzer-accuracy:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[min,cli,install,dev]"

      - name: Validate intent corpora
        run: |
          python scripts/validate_intent_corpus.py data/intent_train.jsonl --min-rows 200 --min-per-intent 20
          python scripts/validate_intent_corpus.py data/intent_val.jsonl --min-rows 50 --min-per-intent 5

      - name: Benchmark intent (fixed val, macro F1 gate)
        run: |
          python scripts/benchmark_intent.py --val-file data/intent_val.jsonl --backend heuristic \
            --output reports/intent_baseline.json --min-macro-f1 0.75

      - name: Benchmark analyzers (fast heuristic sentiment)
        run: |
          python scripts/benchmark_analyzers.py --sentiment-backend heuristic \
            --output reports/analyzer_baseline.json --check-thresholds

      - name: Analyzer accuracy tests
        env:
          ANALYZER_VALIDATION_MODE: strict
        run: |
          pytest tests/test_analyzer_quality.py tests/test_analyzer_benchmarks.py -q