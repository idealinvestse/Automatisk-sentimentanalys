# Dynamic analyzer registration (allowlisted modules only).
# Built-in analyzers are auto-discovered from src/analysis/; this file adds plugins.

allowlist_prefixes:
  - src.analysis.
  - sentiment_analyzers.

builtin: []  # empty = rely on autodiscovery

plugins: []
