# Example LLM configuration for LLM providers (Fas 3.2.3+)
# This can be loaded by future config system or used as reference.
# The primary control is still via profile (see src/profiles.py "callcenter" section)
# and explicit flags in CLI/API/pipeline.

llm:
  enabled: true
  provider: "openrouter"  # openrouter | groq
  default_model: "mistralai/mistral-medium-3.5"
  # Stronger (more expensive) alternative for very complex or high-value calls
  strong_model: "mistralai/mistral-large-3"
  fallback_model: "mistralai/mistral-medium-3.5"
  # Per-call soft budget in USD (client + pipeline can warn or skip)
  cost_budget_per_call: 0.08
  temperature: 0.15
  max_tokens: 4096

  # Privacy / GDPR
  anonymize_before_llm: false   # When true, PII redaction (Fas 3.4) runs before sending transcript
  log_external_calls: true      # Always recommended

  # Selective activation heuristics (used when no explicit --use-mistral-llm)
  activation:
    min_segments: 6
    low_confidence_threshold: 0.55
    profiles: ["callcenter", "call", "customer_service"]

# OpenRouter specific (env var OPENROUTER_API_KEY still required)
openrouter:
  base_url: "https://openrouter.ai/api/v1"
  # You can pin a specific provider if needed
  # provider: "Mistral"

# Groq Cloud specific (env var GROQ_API_KEY required)
# ⚠️ GDPR WARNING: Groq data centers are US + Saudi Arabia — NO confirmed EU hosting.
# Recommended only for non-PII dev workloads or with anonymize_before_llm enabled.
groq:
  base_url: "https://api.groq.com/openai/v1"
  default_model: "llama-3.3-70b-versatile"
  # Production recommendations per use case (see schemas.py GROQ_PROD_MODELS)
  fast_model: "llama-3.1-8b-instant"        # $0.05/$0.08, ~840 tps
  strict_schema_model: "openai/gpt-oss-20b"  # Strict json_schema, $0.075/$0.30
  complex_model: "llama-3.3-70b-versatile"   # Best quality, $0.59/$0.79
  # Fallback chain: 8B → 70B → gpt-oss-20b
  fallback_chain:
    - "llama-3.1-8b-instant"
    - "llama-3.3-70b-versatile"
    - "openai/gpt-oss-20b"
  # GDPR gate: data centers are US + Saudi Arabia (no EU hosting)
  # Set to true ONLY if you accept non-EU data processing or have a DPA with Groq.
  groq_eu_residency: false
  # Enforce PII redaction before any Groq call
  enforce_anonymize_before_llm: true
